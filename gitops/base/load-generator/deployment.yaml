apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  labels:
    app: load-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
      - name: load-generator
        image: robot-shop/load-generator:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: LOAD_INTERVAL
          value: "2000"
        - name: INVENTORY_SERVICE_URL
          value: "http://inventory-service:3001"
        - name: ORDER_SERVICE_URL
          value: "http://order-service:3002"
        - name: USER_SERVICE_URL
          value: "http://user-service:3003"
        - name: INSTANA_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: instana-secret
              key: INSTANA_AGENT_KEY
              optional: true
        - name: INSTANA_AGENT_HOST
          valueFrom:
            secretKeyRef:
              name: instana-secret
              key: INSTANA_AGENT_HOST
              optional: true
        - name: INSTANA_SERVICE_NAME
          value: "robot-shop-load-generator"
        - name: INSTANA_ENABLED
          value: "true"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

