apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: inventory-service
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
      - name: inventory-service
        image: robot-shop/inventory-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: DATABASE_URL
          value: "postgresql://postgres:postgres123@postgres:5432/robotshop"
        - name: INSTANA_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: instana-secret
              key: INSTANA_AGENT_KEY
        - name: INSTANA_AGENT_HOST
          valueFrom:
            secretKeyRef:
              name: instana-secret
              key: INSTANA_AGENT_HOST
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
  strategy:
    blueGreen:
      activeService: inventory-service
      previewService: inventory-service-preview
      autoPromotionEnabled: false
      scaleDownDelaySeconds: 30

